         x="360" y="150" width="40" height="40"/>
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
         x="420" y="150" width="40" height="40"/>
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"
         x="480" y="150" width="40" height="40"/>
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg"
         x="540" y="150" width="40" height="40"/>
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
         x="600" y="150" width="40" height="40"/>
</svg>
