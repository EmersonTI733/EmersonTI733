<svg width="100%" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="250" fill="url(#grad)" rx="20" />

  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle"
        font-size="42" font-family="Arial, sans-serif" fill="white" font-weight="bold">
    Emerson Coelho de Azevedo
  </text>

  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle"
        font-size="22" font-family="Arial, sans-serif" fill="#e0e0e0">
    HTML • CSS • JavaScript • Node.js • Docker • GitHub
  </text>

  <!-- Ícones -->
  <image href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"
         x="300" y="150" width="40" height="40"/>
